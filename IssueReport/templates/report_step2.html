{% extends 'base.html' %}

{% block content %}
 
<div class="max-w-2xl mx-auto mt-12 bg-white rounded-3xl shadow-lg p-10">
<h1 class="text-3xl font-bold text-center mb-2">Report an Issue</h1>
<p class="text-center text-gray-600 mb-10">Step 2 of 3: Add Location</p>
 
    
<div class="flex justify-between items-center mb-12 max-w-md mx-auto">
<div class="flex flex-col items-center">
<div class="w-10 h-10 bg-green-600 text-white rounded-full flex items-center justify-center font-bold">1</div>
<p class="text-xs mt-2 text-green-600 font-medium">Issue Type</p>
</div>
<div class="flex-1 h-1 bg-green-600 mx-4"></div>
<div class="flex flex-col items-center">
<div class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">2</div>
<p class="text-xs mt-2 text-blue-600 font-medium">Location</p>
</div>
<div class="flex-1 h-1 bg-gray-300 mx-4"></div>
<div class="flex flex-col items-center">
<div class="w-10 h-10 bg-gray-300 text-gray-400 rounded-full flex items-center justify-center font-bold">3</div>
<p class="text-xs mt-2 text-gray-400">Submit</p>
</div>
</div>
 
    <form method="post" class="space-y-8">

        {% csrf_token %}
 
        <div>
<label class="block text-sm font-semibold text-gray-700 mb-3">

                Where is the problem happening?
</label>
<input 

                type="text" 

                name="location" 

                placeholder="e.g., 123 Main Street, Kimberley CBD" 

                class="w-full border-2 border-gray-300 focus:border-blue-500 rounded-2xl px-6 py-5 text-lg outline-none"

                required>
<p class="text-xs text-gray-500 mt-2">Be as specific as possible (street address, suburb, landmark)</p>
</div>
 
        <div>
<label class="block text-sm font-semibold text-gray-700 mb-3">

                Additional Description (Optional)
</label>
<textarea 

                name="description" 

                rows="4"

                placeholder="Please describe the issue in detail..."

                class="w-full border-2 border-gray-300 focus:border-blue-500 rounded-3xl px-6 py-5 text-lg outline-none resize-none"></textarea>
</div>
 
        <div class="flex gap-4 pt-6">
<a href="/report/" 

               class="flex-1 text-center py-4 border-2 border-gray-300 hover:border-gray-400 rounded-2xl font-semibold text-gray-700 transition">

                ← Back
</a>
<button type="submit"

                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg transition">

                Next Step →
</button>
</div>
</form>
</div>
 
{% endblock %}
